<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Building your audit… | Belken</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23121110'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%231F32FF'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#EEEAE1;--ink:#121110;--ink-soft:#3a382f;--line:#cdc6b6;
    --ultra:#1F32FF;--ultra-deep:#0e1bb0;--flare:#FF4318;
    --display:"Bricolage Grotesque",sans-serif;--body:"Hanken Grotesk",sans-serif;--mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:17px;line-height:1.55;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:64px 64px;opacity:.16}
  main{position:relative;z-index:1;max-width:560px}
  .eyebrow{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ultra-deep);margin-bottom:24px}
  h1{font-family:var(--display);font-weight:700;font-size:clamp(28px,4vw,42px);letter-spacing:-.03em;margin-bottom:18px;line-height:1.1}
  .lede{color:var(--ink-soft);margin-bottom:36px}
  .spinner{width:64px;height:64px;border:4px solid var(--line);border-top-color:var(--ultra);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 28px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .stage{font-family:var(--mono);font-size:13px;color:var(--ink-soft);margin-bottom:20px;letter-spacing:.04em}
  .stage .pill{display:inline-block;padding:6px 14px;background:#fff;border:1.5px solid var(--line);border-radius:999px;margin:4px}
  .stage .pill.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .stage .pill.done{background:var(--ultra);color:#fff;border-color:var(--ultra)}
  .checkemail{margin-top:36px;padding:24px;background:#fff;border:1.5px solid var(--line);border-radius:14px;font-size:15px;color:var(--ink-soft)}
  .checkemail strong{color:var(--ink);font-weight:700}
  .err{background:#fff1ed;border:1.5px solid var(--flare);color:#7a1f00;padding:18px;border-radius:10px;font-size:14.5px;margin-top:20px;display:none}
  .err.show{display:block}
  .err a{color:var(--ultra-deep);font-weight:700;text-decoration:underline}
</style>
</head>
<body>
<main>
  <div class="eyebrow">Building your audit</div>
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Crunching the numbers for your business…</h1>
  <p class="lede" id="lede">This usually takes 2-5 minutes. You can leave this page open or check your email — we'll deliver either way.</p>

  <div class="stage" id="stages">
    <span class="pill done">received</span>
    <span class="pill active" id="p-rendering">rendering</span>
    <span class="pill" id="p-emailing">emailing</span>
  </div>

  <div class="checkemail" id="checkemail">
    Once it's ready you'll see a download button here <strong>and</strong> get it by email at the address you provided.
  </div>

  <div class="err" id="err"></div>
</main>
<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const titleEl = document.getElementById('title');
  const ledeEl = document.getElementById('lede');
  const spinner = document.getElementById('spinner');
  const stagesEl = document.getElementById('stages');
  const checkemail = document.getElementById('checkemail');
  const err = document.getElementById('err');
  const pRendering = document.getElementById('p-rendering');
  const pEmailing = document.getElementById('p-emailing');

  if(!id){
    spinner.style.display='none';
    titleEl.textContent = 'Missing audit ID';
    ledeEl.textContent = 'Looks like you got here without submitting a form.';
    showErr('No audit id in URL. <a href="/audit">Start a new audit →</a>');
    return;
  }

  function showErr(html){
    err.innerHTML = html;
    err.classList.add('show');
  }

  let pollCount = 0;
  const maxPolls = 60; // 60 * 5s = 5 min ceiling

  async function poll(){
    pollCount++;
    if(pollCount > maxPolls){
      spinner.style.display='none';
      titleEl.textContent = 'Still working on it';
      ledeEl.textContent = 'This one is taking longer than usual. We\'ll email it to you as soon as it\'s ready — you can safely close this page.';
      return;
    }
    try {
      const r = await fetch(`/api/audit/status?id=${encodeURIComponent(id)}`);
      if(!r.ok) throw new Error('status check failed');
      const j = await r.json();

      if(j.status === 'complete'){
        spinner.style.display='none';
        pRendering.classList.remove('active'); pRendering.classList.add('done');
        pEmailing.classList.remove('active'); pEmailing.classList.add('done');
        window.location.href = `/audit/ready?id=${encodeURIComponent(id)}`;
        return;
      }
      if(j.status === 'failed'){
        spinner.style.display='none';
        titleEl.textContent = 'Something went wrong';
        ledeEl.textContent = '';
        showErr('Your audit failed to render. Please <a href="/audit">try again</a> or email <a href="mailto:info@belken.ai">info@belken.ai</a> and we\'ll fix it manually.');
        return;
      }
      if(j.status === 'rendering'){
        pRendering.classList.add('active');
      }
      if(j.status === 'emailing'){
        pRendering.classList.remove('active'); pRendering.classList.add('done');
        pEmailing.classList.add('active');
      }
      // keep polling
      setTimeout(poll, 5000);
    } catch(e){
      // network errors: just keep trying
      setTimeout(poll, 5000);
    }
  }
  poll();
})();
</script>
</body>
</html>
